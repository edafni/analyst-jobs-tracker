name: Daily Analyst Jobs Tracker

on:
  schedule:
    # 07:00 UTC daily (adjust as desired)
    - cron: "0 7 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run pipeline
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          ANALYST_JOBS_SPREADSHEET_ID: ${{ secrets.ANALYST_JOBS_SPREADSHEET_ID }}
          ANALYST_JOBS_WORKSHEET_TITLE: "Analyst Jobs Tracker 2"
          LOG_LEVEL: INFO
          ENABLE_REMOTIVE: "1"
          ENABLE_DDG: "0"
          ENABLE_GOOZALI: "1"
          GOOZALI_TIMEOUT_MS: "180000"
        run: |
          python -m src.pipeline

